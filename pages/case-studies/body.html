<script>
(function(){
  try{if(window.Webflow&&Webflow.env&&Webflow.env('design'))return;}catch(e){}
  if(document.documentElement.classList.contains('wf-design-mode'))return;
  if(window.__pmc_cs_page)return;
  window.__pmc_cs_page=true;

  /* TOPBAR DISMISS */
  (function(){
    var bar=document.querySelector('.topbar-component'),btn=document.querySelector('.topbar-dismiss');
    if(!bar||!btn)return;
    try{if(sessionStorage.getItem('pmc-cs-topbar-dismissed')==='1'){bar.style.display='none';return;}}catch(e){}
    btn.style.minWidth='44px'; btn.style.minHeight='44px'; btn.style.position='relative'; btn.style.zIndex='9999'; btn.style.touchAction='manipulation';
    var dismissed=false;
    function doDismiss(e){
      if(dismissed)return; dismissed=true;
      if(e){e.preventDefault();e.stopPropagation();}
      bar.style.transition='transform 0.35s cubic-bezier(0.22,1,0.36,1),opacity 0.25s ease';
      bar.style.overflow='hidden';
      requestAnimationFrame(function(){bar.style.transform='translateY(-100%)';bar.style.opacity='0';});
      setTimeout(function(){bar.style.display='none';bar.style.transform='';bar.style.opacity='';bar.style.transition='';bar.style.overflow='';},400);
      try{sessionStorage.setItem('pmc-cs-topbar-dismissed','1');}catch(e){}
    }
    btn.addEventListener('pointerdown',doDismiss);
    btn.addEventListener('click',doDismiss);
    bar.addEventListener('click',function(e){if(btn.contains(e.target))doDismiss(e);});
  })();

  /* AMBIENT SPOTLIGHT + AURORA */
  (function(){
    var s=document.querySelector('.section-primary-wrapper.section-cs');
    if(!s)return;
    var rect=null,rafM=null,rafS=null;
    function upRect(){rect=s.getBoundingClientRect();}
    upRect();
    window.addEventListener('resize',upRect,{passive:true});
    window.addEventListener('mousemove',function(e){
      if(rafM)return;
      rafM=requestAnimationFrame(function(){
        if(rect){
          s.style.setProperty('--cs-x',(((e.clientX-rect.left)/rect.width)*100).toFixed(1)+'%');
          s.style.setProperty('--cs-y',(((e.clientY-rect.top)/rect.height)*100).toFixed(1)+'%');
        }
        rafM=null;
      });
    },{passive:true});
    function onScroll(){
      if(rafS)return;
      rafS=requestAnimationFrame(function(){
        upRect();
        if(rect){
          var p=Math.min(1,Math.max(0,1-(rect.top/(window.innerHeight||800))));
          s.style.setProperty('--cs-s',Math.round(p*90)+'px');
        }
        rafS=null;
      });
    }
    window.addEventListener('scroll',onScroll,{passive:true});
    onScroll();
  })();

  /* ACTION CARD SHIMMER */
  (function(){
    var c=document.querySelector('.pmc-cs-action');
    if(!c)return;
    if('IntersectionObserver' in window){
      var obs=new IntersectionObserver(function(entries){
        entries.forEach(function(en){en.isIntersecting?c.classList.add('cs-shimmer-active'):c.classList.remove('cs-shimmer-active');});
      },{threshold:0.15});
      obs.observe(c);
      window.__pmc_cs_obs=obs;
    }else{c.classList.add('cs-shimmer-active');}
  })();

  /* CTA + AUDIT BUTTON SCROLL */
  (function(){
    function scrollToLeadForm(){
      var target =
        document.getElementById('csa-intake-form') ||
        document.querySelector('.pmc-csa-card');
      if(!target) return false;
      target.scrollIntoView({behavior:'smooth',block:'start'});
      return true;
    }

    window.pmcScrollToLeadForm = scrollToLeadForm;

    document.querySelectorAll('.pmc-fcb-btn').forEach(function(btn){
      btn.addEventListener('click', function(e){
        if(scrollToLeadForm()) e.preventDefault();
      });
    });

    document.querySelectorAll('.pmc-audit-btn').forEach(function(btn){
      btn.addEventListener('click', function(e){
        if(scrollToLeadForm()) e.preventDefault();
      });
    });
  })();

  /* RESULTS TABS */
  (function(){
    var tabs=document.querySelectorAll('.pmc-results-tab'),slides=document.querySelectorAll('.pmc-results-slide');
    if(!tabs.length)return;
    tabs.forEach(function(tab){
      tab.addEventListener('click',function(){
        var target=this.getAttribute('data-result');
        tabs.forEach(function(t){t.classList.toggle('is-active',t.getAttribute('data-result')===target);});
        slides.forEach(function(s){s.classList.toggle('is-active',s.id===target);});
      });
    });
  })();

  /* SHOWCASE TABS (top row) */
  (function(){
    var root=document.querySelector('.showcase');
    if(!root) return;
    var tabs=root.querySelectorAll('.sc-tab');
    if(!tabs.length) return;

    function setActive(key){
      tabs.forEach(function(t){
        var isOn = (t.getAttribute('data-tab') === key);
        t.classList.toggle('is-active', isOn);
        t.setAttribute('aria-selected', isOn ? 'true' : 'false');
      });
      root.querySelectorAll('.content-panel').forEach(function(p){
        p.classList.toggle('active', p.id === ('panel-' + key));
      });
    }

    tabs.forEach(function(t){
      t.addEventListener('click', function(){ setActive(this.getAttribute('data-tab')); });
    });

    setActive('website');
  })();

  /* SMOOTH SCROLL WITH OFFSET */
  (function(){
    document.addEventListener('click',function(e){
      var link=e.target.closest('a[href^="#"]');
      if(!link)return;
      var id=link.getAttribute('href');
      if(!id||id==='#')return;
      var target=document.querySelector(id);
      if(!target)return;
      e.preventDefault();
      window.scrollTo({top:target.getBoundingClientRect().top+window.pageYOffset-40,behavior:'smooth'});
    });
  })();
})();
</script>

<!-- LIGHTBOX - Event delegation -->
<script>
(function(){
  if(window.__pmc_cs_lightbox)return;
  window.__pmc_cs_lightbox=true;
  try{if(window.Webflow&&Webflow.env&&Webflow.env('design'))return;}catch(e){}

  var lb=document.getElementById('sc-lightbox');
  if(!lb) return;

  var lbImg=document.getElementById('sc-lb-img');
  var lbCap=document.getElementById('sc-lb-caption');
  var closeBtn=lb.querySelector('.sc-lb-close');

  function openLb(src, alt, caption){
    if(!lbImg) return;
    lbImg.src=src||'';
    lbImg.alt=alt||'';
    if(lbCap) lbCap.textContent=caption||'';
    lb.classList.add('is-open');
    document.body.style.overflow='hidden';
  }

  function closeLb(){
    lb.classList.remove('is-open');
    document.body.style.overflow='';
    if(lbImg) lbImg.src='';
    if(lbCap) lbCap.textContent='';
  }

  document.addEventListener('click', function(e){
    var t=e.target;
    if(!(t && t.classList && t.classList.contains('sc-zoomable'))) return;
    e.preventDefault();
    e.stopPropagation();
    openLb(t.getAttribute('src'), t.getAttribute('alt'), t.getAttribute('data-caption'));
  });

  if(closeBtn){
    closeBtn.addEventListener('click', function(e){
      e.preventDefault();
      e.stopPropagation();
      closeLb();
    });
  }

  lb.addEventListener('click', function(e){
    if(e.target===lb) closeLb();
  });

  document.addEventListener('keydown', function(e){
    if(e.key==='Escape' && lb.classList.contains('is-open')) closeLb();
  });
})();
</script>
