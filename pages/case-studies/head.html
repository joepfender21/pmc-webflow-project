<meta name="robots" content="noindex, nofollow">

<style>
  /* Disable all animations in Webflow Designer to prevent canvas crashes */
  html.wf-design-mode *,
  html.wf-design-mode *::before,
  html.wf-design-mode *::after { animation: none !important; }

  /* ========================================
     PMC CASE STUDIES - ALL PAGE CSS
     ======================================== */

  /* --- AMBIENT SPOTLIGHT + AURORA --- */
  .section-primary-wrapper.section-cs { position: relative; overflow: hidden; }
  .section-primary-wrapper.section-cs::before,
  .section-primary-wrapper.section-cs::after {
    content: ""; position: absolute; inset: -2px;
    pointer-events: none; z-index: 0; opacity: 0;
    transition: opacity 500ms ease;
  }
  .section-primary-wrapper.section-cs::before {
    opacity: 0.50;
    background: radial-gradient(480px circle at var(--cs-x,50%) var(--cs-y,35%),
      rgba(215,175,51,0.09), rgba(69,115,64,0.06) 35%, rgba(0,0,0,0) 70%);
    mix-blend-mode: screen;
  }
  .section-primary-wrapper.section-cs::after {
    opacity: 0.60;
    background:
      radial-gradient(750px circle at 18% calc(8% + var(--cs-s,0px)), rgba(69,115,64,0.09), rgba(0,0,0,0) 60%),
      radial-gradient(800px circle at 82% calc(25% + var(--cs-s,0px)), rgba(215,175,51,0.07), rgba(0,0,0,0) 65%);
    filter: blur(12px); mix-blend-mode: screen;
  }
  .section-primary-wrapper.section-cs > * { position: relative; z-index: 1; }

  /* --- LOGO HALO --- */
  .start-logo-stage.is-cs {
    position: relative; border-radius: 999px;
    transition: transform 400ms cubic-bezier(0.22,1,0.36,1);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 0 40px 10px rgba(69,115,64,0.07), 0 0 70px 22px rgba(215,175,51,0.04);
  }
  .start-logo-stage.is-cs::after {
    content: ""; position: absolute; inset: -10px; border-radius: inherit;
    background: conic-gradient(from 220deg, rgba(69,115,64,0.0), rgba(69,115,64,0.18), rgba(215,175,51,0.16), rgba(69,115,64,0.0));
    filter: blur(10px); opacity: 0.50;
    animation: cs-orbit 12s linear infinite; pointer-events: none;
  }
  .start-logo-stage.is-cs:hover {
    transform: translateY(-1px) scale(1.01);
    box-shadow: 0 0 0 1px rgba(215,175,51,0.18), 0 0 55px 14px rgba(69,115,64,0.10), 0 0 95px 28px rgba(215,175,51,0.06);
  }
  @keyframes cs-orbit { to { transform: rotate(360deg); } }

  /* --- DIVIDER --- */
  .div-embed-divider.is-cs { position: relative; overflow: hidden; opacity: 0.72; }
  .section-primary-wrapper.section-cs:hover .div-embed-divider.is-cs { opacity: 0.85; width: 48px; }
  .div-embed-divider.is-cs::after {
    content: ""; position: absolute; top: -50%; left: -35%; width: 35%; height: 200%;
    background: linear-gradient(90deg, rgba(215,175,51,0) 0%, rgba(215,175,51,0.55) 50%, rgba(215,175,51,0) 100%);
    transform: skewX(-18deg) translateX(-120%); opacity: 0; pointer-events: none;
  }
  .section-primary-wrapper.section-cs:hover .div-embed-divider.is-cs::after {
    opacity: 1; animation: cs-divider-shimmer 1.15s cubic-bezier(0.22,1,0.36,1) infinite;
  }
  @keyframes cs-divider-shimmer {
    0%   { transform: skewX(-18deg) translateX(-120%); }
    100% { transform: skewX(-18deg) translateX(420%); }
  }

  /* --- ACTION CARD SHIMMER --- */
  .pmc-cs-action { position: relative; overflow: hidden; }
  .pmc-cs-action::after {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: rgba(215,175,51,0.18); pointer-events: none; z-index: 2;
  }
  .pmc-cs-action::before {
    content: ""; position: absolute; top: 0; left: -40%; width: 180%; height: 2px;
    background: linear-gradient(90deg, rgba(215,175,51,0) 0%, rgba(215,175,51,0.20) 30%, rgba(215,175,51,0.95) 50%, rgba(215,175,51,0.20) 70%, rgba(215,175,51,0) 100%);
    opacity: 0; transform: translateX(-35%);
    filter: drop-shadow(0 0 10px rgba(215,175,51,0.22)); pointer-events: none; z-index: 3;
  }
  .pmc-cs-action.cs-shimmer-active::before {
    opacity: 0.95; animation: cs-top-shimmer 2.6s linear infinite, cs-top-glow 4.5s ease-in-out infinite;
  }
  @keyframes cs-top-shimmer { 0% { transform: translateX(-35%); } 100% { transform: translateX(35%); } }
  @keyframes cs-top-glow {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(215,175,51,0.18)); opacity: 0.70; }
    50%      { filter: drop-shadow(0 0 14px rgba(215,175,51,0.30)); opacity: 0.98; }
  }

  /* --- FOUNDING CLIENT BANNER --- */
  .pmc-fcb-wrap { max-width: 780px; margin: 0; padding: 0 20px; width: 100%; position: relative; z-index: 3; }
  .pmc-fcb-banner {
    position: relative; display: flex; align-items: center; justify-content: space-between;
    gap: 28px; padding: 28px 36px;
    background: linear-gradient(135deg, rgba(69,115,64,0.08) 0%, rgba(4,13,13,0.95) 40%, rgba(4,13,13,0.95) 60%, rgba(215,175,51,0.06) 100%);
    border: 1px solid rgba(69,115,64,0.18); border-radius: 14px;
    overflow: hidden; transition: border-color 0.4s ease;
  }
  .pmc-fcb-banner:hover { border-color: rgba(215,175,51,0.25); }
  .pmc-fcb-banner::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, rgba(69,115,64,0.0) 0%, rgba(69,115,64,0.6) 20%, rgba(215,175,51,0.8) 50%, rgba(69,115,64,0.6) 80%, rgba(69,115,64,0.0) 100%);
    opacity: 0.7;
  }
  .pmc-fcb-banner::after {
    content: ""; position: absolute; top: -40px; right: -40px; width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(215,175,51,0.06) 0%, transparent 70%); pointer-events: none;
  }
  .pmc-fcb-content { position: relative; z-index: 1; flex: 1; min-width: 0; }
  .pmc-fcb-tag { display: inline-flex; align-items: center; gap: 7px; margin-bottom: 10px; }
  .pmc-fcb-pulse { width: 6px; height: 6px; border-radius: 50%; background: #D7AF33; position: relative; }
  .pmc-fcb-pulse::after {
    content: ""; position: absolute; inset: -3px; border-radius: 50%;
    background: rgba(215,175,51,0.3); animation: pmc-fcb-ping 2s cubic-bezier(0,0,0.2,1) infinite;
  }
  @keyframes pmc-fcb-ping { 0% { transform: scale(1); opacity: 0.6; } 75%, 100% { transform: scale(2.2); opacity: 0; } }
  .pmc-fcb-tag-text { font-family: 'Satoshi', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1.6px; text-transform: uppercase; color: #D7AF33; }
  .pmc-fcb-headline { font-family: 'Clash Display', sans-serif; font-weight: 600; font-size: 18px; color: #F5F0E8; letter-spacing: -0.2px; line-height: 1.35; margin: 0 0 6px 0; }
  .pmc-fcb-sub { font-family: 'Satoshi', sans-serif; font-size: 13.5px; color: rgba(245,240,232,0.45); line-height: 1.55; margin: 0; }
  .pmc-fcb-cta { position: relative; z-index: 1; flex-shrink: 0; }
  .pmc-fcb-btn {
    display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px;
    background: #D7AF33; color: #040D0D; font-family: 'Satoshi', sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
    text-decoration: none; border: none; border-radius: 8px; cursor: pointer;
    transition: all 0.2s ease; white-space: nowrap; box-shadow: 0 2px 12px rgba(215,175,51,0.15);
  }
  .pmc-fcb-btn:hover { background: #E5C044; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(215,175,51,0.25); }
  .pmc-fcb-btn:active { transform: translateY(0); }
  .pmc-fcb-btn svg { transition: transform 0.2s ease; }
  .pmc-fcb-btn:hover svg { transform: translateX(2px); }

  /* --- RESULTS SHOWCASE --- */
  .pmc-results { max-width: 780px; margin: 0 auto; padding: 0 20px; }
  .pmc-results-tabs {
    display: flex; gap: 4px; margin-bottom: 0; padding: 4px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px 10px 0 0; max-width: 420px;
  }
  .pmc-results-tab {
    flex: 1; padding: 10px 20px; font-family: 'Satoshi', sans-serif; font-size: 12.5px;
    font-weight: 600; letter-spacing: 0.3px; color: rgba(245,240,232,0.35);
    background: none; border: none; border-radius: 7px; cursor: pointer;
    transition: all 0.25s ease; text-align: center; white-space: nowrap;
  }
  .pmc-results-tab:hover { color: rgba(245,240,232,0.6); }
  .pmc-results-tab.is-active { color: #040D0D; background: #D7AF33; font-weight: 700; }
  .pmc-results-slide { display: none; }
  .pmc-results-slide.is-active { display: block; }
  .pmc-results-card {
    background: rgba(255,255,255,0.015); border: 1px solid rgba(69,115,64,0.1);
    border-radius: 0 16px 16px 16px; padding: 40px 36px 44px;
    position: relative; overflow: hidden;
  }
  .pmc-results-card::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, rgba(69,115,64,0.5), rgba(215,175,51,0.4), rgba(69,115,64,0.2), transparent);
  }
  .pmc-results-card .results-eyebrow { font-family: 'Satoshi', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; color: rgba(215,175,51,0.6); margin-bottom: 10px; }
  .pmc-results-card .results-title { font-family: 'Clash Display', sans-serif; font-weight: 600; font-size: 26px; color: #F5F0E8; letter-spacing: -0.3px; line-height: 1.2; margin-bottom: 4px; }
  .pmc-results-card .results-client { font-family: 'Satoshi', sans-serif; font-size: 14px; color: rgba(245,240,232,0.35); margin-bottom: 32px; }
  .pmc-metrics-row { display: flex; gap: 14px; margin-bottom: 24px; }
  .pmc-metric-card {
    flex: 1; min-width: 0; background: rgba(255,255,255,0.025);
    border: 1px solid rgba(69,115,64,0.12); border-radius: 14px; padding: 22px 18px;
    position: relative; overflow: hidden; transition: border-color 0.3s ease, transform 0.2s ease;
  }
  .pmc-metric-card:hover { border-color: rgba(215,175,51,0.2); transform: translateY(-2px); }
  .pmc-metric-card::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, rgba(69,115,64,0.4), rgba(215,175,51,0.3));
    opacity: 0.6; border-radius: 14px 14px 0 0;
  }
  .pmc-metric-card .metric-label { font-family: 'Satoshi', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: rgba(245,240,232,0.3); margin-bottom: 8px; line-height: 1.4; }
  .pmc-metric-card .metric-value { font-family: 'Clash Display', sans-serif; font-weight: 600; font-size: 34px; color: #D7AF33; letter-spacing: -0.5px; line-height: 1.1; margin-bottom: 6px; }
  .pmc-metric-card .metric-context { font-family: 'Satoshi', sans-serif; font-size: 11px; font-weight: 500; color: rgba(143,191,138,0.8); line-height: 1.4; }
  .pmc-results-story { font-family: 'Satoshi', sans-serif; font-size: 14.5px; color: rgba(245,240,232,0.55); line-height: 1.75; max-width: 640px; margin-bottom: 28px; }
  .pmc-results-quote { position: relative; padding: 24px 28px 24px 32px; background: rgba(255,255,255,0.015); border-left: 3px solid rgba(215,175,51,0.35); border-radius: 0 12px 12px 0; }
  .pmc-results-quote::before { content: "\201C"; position: absolute; top: 10px; left: 12px; font-family: 'Clash Display', serif; font-size: 48px; color: rgba(215,175,51,0.1); line-height: 1; pointer-events: none; }
  .pmc-results-quote .quote-text { font-family: 'Satoshi', sans-serif; font-size: 15px; font-weight: 500; color: #F5F0E8; line-height: 1.65; font-style: italic; margin-bottom: 14px; position: relative; z-index: 1; }
  .pmc-results-quote .quote-author { font-family: 'Satoshi', sans-serif; font-size: 12px; font-weight: 600; color: rgba(245,240,232,0.35); letter-spacing: 0.3px; position: relative; z-index: 1; }

  /* ========================================
     SHOWCASE WIDGET
     ======================================== */
  :root {
    --pmc-dark: #040D0D;
    --pmc-dark2: #0A1414;
    --pmc-white: #FBFCFB;
    --pmc-gray: rgba(251,252,251,0.55);
    --pmc-muted: rgba(245,240,232,0.45);
    --pmc-gold: #D7AF33;
    --pmc-gold-dim: rgba(215,175,51,0.10);
    --pmc-green: #457340;
    --pmc-green-dim: rgba(69,115,64,0.10);
    --pc-slate: #2C3E50;
    --pc-peach: #ECC8BA;
    --pc-gold: #D4AF37;
    --pc-cream: #F8F4F0;
    --radius: 10px;
    --radius-sm: 6px;
  }

  .showcase { max-width:1040px; margin:0 auto; padding:32px 0; }
  .showcase-header { text-align:center; margin-bottom:20px; }
  .showcase-header h2 { font-family:'Clash Display',sans-serif; font-size:38px; font-weight:600; letter-spacing:-0.02em; margin:0; }

  /* --- TOP TABS --- */
  .sc-tabs { display:flex; gap:10px; flex-wrap:wrap; margin:0 0 24px 0; justify-content:center; }
  .sc-tab {
    appearance:none; border:1px solid rgba(255,255,255,0.08);
    background:rgba(4,13,13,0.55); border-radius:12px;
    padding:12px 16px; display:flex; align-items:center; gap:10px;
    cursor:pointer; user-select:none; text-align:left; color:inherit;
    transition:transform 0.2s ease, border-color 0.25s ease, background 0.25s ease;
  }
  .sc-tab:hover { transform:translateY(-1px); border-color:rgba(215,175,51,0.20); background:rgba(4,13,13,0.70); }
  .sc-tab.is-active { border-color:rgba(215,175,51,0.30); box-shadow:0 0 0 1px rgba(215,175,51,0.10); }
  .sc-tab:focus-visible { outline:2px solid rgba(215,175,51,0.35); outline-offset:2px; }
  .sc-tab-icon { width:20px; height:20px; display:grid; place-items:center; flex:0 0 auto; }
  .sc-tab-icon img { width:20px; height:20px; display:block; image-rendering:auto; }
  .sc-tab-meta { display:flex; flex-direction:column; gap:2px; min-width:0; }
  .sc-tab-title { font-family:'Satoshi',sans-serif; font-size:12px; font-weight:700; letter-spacing:0.6px; text-transform:uppercase; color:rgba(245,240,232,0.85); line-height:1.15; }
  .sc-tab-sub { font-family:'Satoshi',sans-serif; font-size:11px; color:rgba(245,240,232,0.40); line-height:1.15; }

  .showcase-content { position:relative; }
  .content-panel { display:none; }
  .content-panel.active { display:block; animation:panelIn 0.4s ease; }
  @keyframes panelIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  /* ========================================
     WEBSITE TAB - overlapping device composition + real scroll
     ======================================== */
  .devices-scene {
    position: relative;
    width: 100%;
    height: 480px;
    margin-bottom: 20px;
  }

  .dev { position: absolute; }
  .dev-frame {
    border-radius: 10px;
    border: 2px solid #2a2a2a;
    background: #181818;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
  }
  .dev:hover .dev-frame {
    transform: translateY(-4px);
    border-color: rgba(215,175,51,0.22);
    box-shadow: 0 24px 70px rgba(0,0,0,0.55), 0 0 0 1px rgba(215,175,51,0.10);
  }
  .dev-screen {
    overflow: hidden;
    background: #0a0a0a;
  }
  .dev-screen img {
    display: block;
    width: 100%;
    height: auto;
    will-change: transform;
  }
  .dev-label {
    text-align: center; margin-top: 8px;
    font-family: 'Satoshi', sans-serif;
    font-size: 9px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--pmc-gray);
  }

  .dev-phone {
    left: 0; bottom: 0; width: 130px; z-index: 3;
  }
  .dev-phone .dev-frame {
    border-radius: 20px; padding: 6px 5px;
    position: relative;
  }
  .dev-phone .dev-frame::before {
    content: ''; position: absolute; top: 4px; left: 50%; transform: translateX(-50%);
    width: 30px; height: 4px; background: #2a2a2a; border-radius: 4px; z-index: 2;
  }
  .dev-phone .dev-screen {
    border-radius: 14px; margin-top: 2px;
    height: 260px;
  }

  .dev-tablet {
    left: 80px; bottom: 30px; width: 300px; z-index: 2;
  }
  .dev-tablet .dev-frame {
    border-radius: 14px; padding: 10px;
  }
  .dev-tablet .dev-screen {
    border-radius: 6px;
    height: 240px;
  }

  .dev-laptop {
    right: 0; bottom: 0; width: 62%; z-index: 1;
  }
  .dev-laptop .dev-frame {
    border-radius: 8px 8px 0 0; padding: 6px 6px 0;
    border-bottom: none; position: relative;
  }
  .dev-laptop .dev-frame::before {
    content: ''; position: absolute; top: 3px; left: 50%; transform: translateX(-50%);
    width: 5px; height: 5px; background: #2a2a2a; border-radius: 50%; z-index: 2;
  }
  .dev-laptop .dev-screen {
    border-radius: 3px 3px 0 0; margin-top: 2px;
    height: 300px;
  }
  .dev-laptop-base {
    height: 12px; width: 108%; margin-left: -4%;
    background: linear-gradient(180deg, #2a2a2a, #1e1e1e 40%, #181818);
    border-radius: 0 0 8px 8px;
    border: 2px solid #2a2a2a; border-top: 1px solid #333;
  }

  @keyframes dev-scroll {
    0%, 10%  { transform: translateY(0); }
    40%, 60% { transform: translateY(-50%); }
    90%, 100% { transform: translateY(0); }
  }
  .dev-phone .dev-screen img, .dev-tablet .dev-screen img, .dev-laptop .dev-screen img { animation: none; }

  .project-info { padding:18px 20px; background:rgba(69,115,64,0.05); border:1px solid rgba(69,115,64,0.12); border-radius:var(--radius); }
  .project-info .pi-title { font-family:'Clash Display',sans-serif; font-size:13px; font-weight:600; color:var(--pmc-green); margin-bottom:4px; }
  .project-info .pi-text { font-size:12px; color:var(--pmc-muted); line-height:1.6; }

  /* ========================================
     BRAND TAB
     ======================================== */
  .brand-intro { margin-bottom:24px; }
  .brand-intro-label { font-family:'Satoshi',sans-serif; font-size:11px; font-weight:700; letter-spacing:1.8px; text-transform:uppercase; color:rgba(215,175,51,0.6); margin-bottom:8px; }
  .brand-intro-title { font-family:'Clash Display',sans-serif; font-weight:600; font-size:22px; color:#F5F0E8; letter-spacing:-0.2px; line-height:1.25; margin:0; }

  .brand-palette { display:flex; gap:10px; margin-bottom:24px; }
  .brand-palette .bp-swatch { flex:1; background:rgba(0,0,0,0.25); border-radius:var(--radius-sm); overflow:hidden; }
  .brand-palette .bp-color { height:36px; }
  .brand-palette .bp-info { padding:8px 10px; }
  .brand-palette .bp-name { font-family:'Satoshi',sans-serif; font-size:10px; font-weight:600; color:var(--pmc-white); margin-bottom:1px; }
  .brand-palette .bp-hex { font-size:9px; font-family:monospace; color:rgba(251,252,251,0.8); }
  .brand-palette .bp-use { font-size:8px; margin-top:3px; color:rgba(251,252,251,0.55); }

  .logo-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .logo-card { border-radius:var(--radius); overflow:hidden; border:1px solid rgba(251,252,251,0.06); position:relative; transition:border-color 0.3s ease; }
  .logo-card:hover { border-color:rgba(215,175,51,0.15); }
  .logo-card .logo-img-wrap { display:flex; align-items:center; justify-content:center; padding:28px 20px; min-height:180px; }
  .logo-card .logo-img-wrap img { max-width:70%; max-height:140px; object-fit:contain; }
  .logo-card .logo-meta { padding:10px 14px; display:flex; align-items:center; justify-content:space-between; }
  .anno { font-size:8px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:3px 8px; border-radius:3px; white-space:nowrap; }
  .anno-gold { background:rgba(212,175,55,0.12); color:var(--pc-gold); border:1px solid rgba(212,175,55,0.2); }
  .anno-slate { background:rgba(44,62,80,0.5); color:var(--pc-cream); border:1px solid rgba(44,62,80,0.6); }
  .anno-peach-inv { background:rgba(44,62,80,0.55); color:var(--pc-cream); border:1px solid rgba(44,62,80,0.6); }
  .logo-name { font-size:11px; font-weight:600; color:var(--pmc-white); letter-spacing:0.3px; }
  .logo-card.light-card .logo-name { color:var(--pc-slate); }
  .logo-wide { grid-column:1/-1; }
  .logo-wide-inner { display:flex; align-items:center; justify-content:center; gap:24px; padding:20px 24px; min-height:110px; }
  .logo-wide-inner .lw-preview { flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .logo-wide-inner .lw-preview img { max-height:90px; object-fit:contain; }

  .icon-mark-card .logo-wide-inner { flex-direction:column; gap:16px; padding:24px; }
  .icon-mark-svgs { display:flex; gap:24px; align-items:center; justify-content:center; }
