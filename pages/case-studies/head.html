<meta name="robots" content="noindex, nofollow">

<style>
  html.wf-design-mode *,html.wf-design-mode *::before,html.wf-design-mode *::after { animation:none !important; }

  /* === HERO === */
  .section-primary-wrapper.section-cs { position:relative; overflow:hidden; padding-top:80px; padding-bottom:44px; }
  .section-primary-wrapper.section-cs::before,.section-primary-wrapper.section-cs::after { content:""; position:absolute; inset:-2px; pointer-events:none; z-index:0; opacity:0; transition:opacity 500ms ease; }
  .section-primary-wrapper.section-cs::before { opacity:0.50; background:radial-gradient(480px circle at var(--cs-x,50%) var(--cs-y,35%), rgba(215,175,51,0.09), rgba(69,115,64,0.06) 35%, rgba(0,0,0,0) 70%); mix-blend-mode:screen; }
  .section-primary-wrapper.section-cs::after { opacity:0.60; background:radial-gradient(750px circle at 18% calc(8% + var(--cs-s,0px)), rgba(69,115,64,0.09), rgba(0,0,0,0) 60%), radial-gradient(800px circle at 82% calc(25% + var(--cs-s,0px)), rgba(215,175,51,0.07), rgba(0,0,0,0) 65%); filter:blur(12px); mix-blend-mode:screen; }
  .section-primary-wrapper.section-cs > * { position:relative; z-index:1; }

  /* === LOGO HALO === */
  .start-logo-stage.is-cs { position:relative; border-radius:999px; transition:transform 400ms cubic-bezier(0.22,1,0.36,1); box-shadow:0 0 0 1px rgba(255,255,255,0.06), 0 0 40px 10px rgba(69,115,64,0.07), 0 0 70px 22px rgba(215,175,51,0.04); }
  .start-logo-stage.is-cs::after { content:""; position:absolute; inset:-10px; border-radius:inherit; background:conic-gradient(from 220deg, rgba(69,115,64,0.0), rgba(69,115,64,0.18), rgba(215,175,51,0.16), rgba(69,115,64,0.0)); filter:blur(10px); opacity:0.50; animation:cs-orbit 12s linear infinite; pointer-events:none; }
  .start-logo-stage.is-cs:hover { transform:translateY(-1px) scale(1.01); box-shadow:0 0 0 1px rgba(215,175,51,0.18), 0 0 55px 14px rgba(69,115,64,0.10), 0 0 95px 28px rgba(215,175,51,0.06); }
  @keyframes cs-orbit { to { transform:rotate(360deg); } }

  /* === TOPBAR === */
  .topbar-dismiss { position:relative !important; z-index:100 !important; cursor:pointer !important; pointer-events:auto !important; touch-action:manipulation !important; }

  /* === DIVIDER === */
  .div-embed-divider.is-cs { position:relative; overflow:hidden; opacity:0.72; }
  .section-primary-wrapper.section-cs:hover .div-embed-divider.is-cs { opacity:0.85; width:48px; }
  .div-embed-divider.is-cs::after { content:""; position:absolute; top:-50%; left:-35%; width:35%; height:200%; background:linear-gradient(90deg, rgba(215,175,51,0) 0%, rgba(215,175,51,0.55) 50%, rgba(215,175,51,0) 100%); transform:skewX(-18deg) translateX(-120%); opacity:0; pointer-events:none; }
  .section-primary-wrapper.section-cs:hover .div-embed-divider.is-cs::after { opacity:1; animation:cs-divider-shimmer 1.15s cubic-bezier(0.22,1,0.36,1) infinite; }
  @keyframes cs-divider-shimmer { 0% { transform:skewX(-18deg) translateX(-120%); } 100% { transform:skewX(-18deg) translateX(420%); } }

  /* === ACTION CARD SHIMMER === */
  .pmc-cs-action { position:relative; overflow:hidden; }
  .pmc-cs-action::after { content:""; position:absolute; top:0; left:0; right:0; height:1px; background:rgba(215,175,51,0.18); pointer-events:none; z-index:2; }
  .pmc-cs-action::before { content:""; position:absolute; top:0; left:-40%; width:180%; height:2px; background:linear-gradient(90deg, rgba(215,175,51,0) 0%, rgba(215,175,51,0.20) 30%, rgba(215,175,51,0.95) 50%, rgba(215,175,51,0.20) 70%, rgba(215,175,51,0) 100%); opacity:0; transform:translateX(-35%); filter:drop-shadow(0 0 10px rgba(215,175,51,0.22)); pointer-events:none; z-index:3; }
  .pmc-cs-action.cs-shimmer-active::before { opacity:0.95; animation:cs-top-shimmer 2.6s linear infinite, cs-top-glow 4.5s ease-in-out infinite; }
  @keyframes cs-top-shimmer { 0% { transform:translateX(-35%); } 100% { transform:translateX(35%); } }
  @keyframes cs-top-glow { 0%,100% { filter:drop-shadow(0 0 8px rgba(215,175,51,0.18)); opacity:0.70; } 50% { filter:drop-shadow(0 0 14px rgba(215,175,51,0.30)); opacity:0.98; } }

  /* === CTA BANNER === */
  .pmc-fcb-wrap { max-width:780px; margin:0 auto !important; padding:0 20px; width:100%; position:relative; z-index:3; }
  .pmc-fcb-banner { position:relative; display:flex; align-items:center; justify-content:space-between; gap:24px; padding:32px 36px; background:linear-gradient(135deg, rgba(69,115,64,0.08) 0%, rgba(4,13,13,0.95) 40%, rgba(4,13,13,0.95) 60%, rgba(215,175,51,0.06) 100%); border:1px solid rgba(69,115,64,0.18); border-radius:14px; overflow:hidden; transition:border-color 0.4s ease; }
  .pmc-fcb-banner:hover { border-color:rgba(215,175,51,0.25); }
  .pmc-fcb-banner::before { content:""; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg, rgba(69,115,64,0.0) 0%, rgba(69,115,64,0.6) 20%, rgba(215,175,51,0.8) 50%, rgba(69,115,64,0.6) 80%, rgba(69,115,64,0.0) 100%); opacity:0.7; }
  .pmc-fcb-banner::after { content:""; position:absolute; top:-40px; right:-40px; width:160px; height:160px; background:radial-gradient(circle, rgba(215,175,51,0.06) 0%, transparent 70%); pointer-events:none; }
  .pmc-fcb-content { position:relative; z-index:1; flex:1; min-width:0; }
  .pmc-fcb-tag { display:inline-flex; align-items:center; gap:7px; margin-bottom:8px; }
  .pmc-fcb-pulse { width:6px; height:6px; border-radius:50%; background:#D7AF33; position:relative; }
  .pmc-fcb-pulse::after { content:""; position:absolute; inset:-3px; border-radius:50%; background:rgba(215,175,51,0.3); animation:pmc-fcb-ping 2s cubic-bezier(0,0,0.2,1) infinite; }
  @keyframes pmc-fcb-ping { 0% { transform:scale(1); opacity:0.6; } 75%,100% { transform:scale(2.2); opacity:0; } }
  .pmc-fcb-tag-text { font-family:'Satoshi',sans-serif; font-size:11px; font-weight:700; letter-spacing:1.6px; text-transform:uppercase; color:#D7AF33; }
  .pmc-fcb-headline { font-family:'Clash Display',sans-serif; font-weight:600; font-size:18px; color:#F5F0E8; letter-spacing:-0.2px; line-height:1.35; margin:0 0 6px 0; }
  .pmc-fcb-sub { font-family:'Satoshi',sans-serif; font-size:13.5px; color:rgba(245,240,232,0.7); line-height:1.55; margin:0; }
  .pmc-fcb-cta { position:relative; z-index:1; flex-shrink:0; }
  .pmc-fcb-btn { display:inline-flex; align-items:center; gap:8px; padding:16px 32px; background:#D7AF33; color:#040D0D; font-family:'Satoshi',sans-serif; font-size:13px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; text-decoration:none; border:none; border-radius:8px; cursor:pointer; transition:all 0.2s ease; white-space:nowrap; box-shadow:0 2px 12px rgba(215,175,51,0.15); }
  .pmc-fcb-btn:hover { background:#c9a12e; transform:translateY(-1px); box-shadow:0 4px 20px rgba(215,175,51,0.25); }
  .pmc-fcb-btn:active { transform:translateY(0); }
  .pmc-fcb-btn svg { transition:transform 0.2s ease; }
  .pmc-fcb-btn:hover svg { transform:translateX(2px); }

  /* === RESULTS TABS === */
  .pmc-results { max-width:780px; margin:0 auto; padding:0 20px; }
  .pmc-results-tabs { display:flex; gap:4px; margin-bottom:0; padding:4px; background:#040D0D; border:1px solid rgba(255,255,255,0.06); border-radius:10px 10px 0 0; width:100%; }
  .pmc-results-tab { flex:1; padding:10px 20px; font-family:'Satoshi',sans-serif; font-size:12.5px; font-weight:600; letter-spacing:0.3px; color:rgba(245,240,232,0.35); background:transparent; border:none; border-radius:7px; cursor:pointer; transition:all 0.25s ease; text-align:center; white-space:nowrap; }
  .pmc-results-tab:hover { color:rgba(245,240,232,0.6); }
  .pmc-results-tab.is-active { color:#040D0D; background:#D7AF33; font-weight:700; }
  .pmc-results-slide { display:none; }
  .pmc-results-slide.is-active { display:block; }
  .pmc-results-card { background:rgba(255,255,255,0.015); border:1px solid rgba(69,115,64,0.1); border-radius:0 0 16px 16px; padding:40px 36px; position:relative; overflow:hidden; }
  .pmc-results-card::before { content:""; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg, rgba(69,115,64,0.5), rgba(215,175,51,0.4), rgba(69,115,64,0.2), transparent); }
  .pmc-results-card .results-eyebrow { font-family:'Satoshi',sans-serif; font-size:13px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#D7AF33; margin-bottom:8px; }
  .pmc-results-card .results-title { font-family:'Clash Display',sans-serif; font-weight:600; font-size:26px; color:#F5F0E8; letter-spacing:-0.3px; line-height:1.2; margin-bottom:4px; }
  .pmc-results-card .results-client { font-family:'Satoshi',sans-serif; font-size:14px; color:rgba(245,240,232,0.35); margin-bottom:32px; }
  .pmc-metrics-row { display:flex; gap:16px; margin-bottom:24px; }
  .pmc-metric-card { flex:1; min-width:0; background:rgba(255,255,255,0.025); border:1px solid rgba(69,115,64,0.12); border-radius:14px; padding:24px 20px; position:relative; overflow:hidden; transition:border-color 0.3s ease, transform 0.2s ease; }
  .pmc-metric-card:hover { border-color:rgba(215,175,51,0.2); transform:translateY(-2px); }
  .pmc-metric-card::before { content:""; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg, rgba(69,115,64,0.4), rgba(215,175,51,0.3)); opacity:0.6; border-radius:14px 14px 0 0; }
  .pmc-metric-card .metric-label { font-family:'Satoshi',sans-serif; font-size:10px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; color:rgba(245,240,232,0.3); margin-bottom:8px; line-height:1.4; }
  .pmc-metric-card .metric-value { font-family:'Clash Display',sans-serif; font-weight:600; font-size:34px; color:#D7AF33; letter-spacing:-0.5px; line-height:1.1; margin-bottom:6px; }
  .pmc-metric-card .metric-context { font-family:'Satoshi',sans-serif; font-size:11px; font-weight:500; color:rgba(143,191,138,0.8); line-height:1.4; }
  .pmc-results-story { font-family:'Satoshi',sans-serif; font-size:14.5px; color:rgba(245,240,232,0.85); line-height:1.75; max-width:640px; margin-bottom:24px; }
  .pmc-results-quote { position:relative; margin-top:24px; padding:24px 28px 24px 32px; background:rgba(255,255,255,0.015); border-left:3px solid rgba(215,175,51,0.55); border-radius:0 12px 12px 0; }
  .pmc-results-quote::before { content:"\201C"; position:absolute; top:10px; left:12px; font-family:'Clash Display',serif; font-size:48px; color:rgba(215,175,51,0.2); line-height:1; pointer-events:none; }
  .pmc-results-quote .quote-text { font-family:'Satoshi',sans-serif; font-size:15px; font-weight:500; color:#F5F0E8; line-height:1.65; font-style:italic; margin-bottom:14px; position:relative; z-index:1; }
  .pmc-results-quote .quote-author { font-family:'Satoshi',sans-serif; font-size:12px; font-weight:600; color:rgba(245,240,232,0.35); letter-spacing:0.3px; position:relative; z-index:1; }

  /* === SHOWCASE WIDGET === */
  .showcase { max-width:1040px; margin:0 auto; padding:32px 0; }
  .showcase-header { text-align:center; margin-bottom:20px; }
  .showcase-header h2 { font-family:'Clash Display',sans-serif; font-size:38px; font-weight:600; letter-spacing:-0.02em; margin:0; color:#F5F0E8; }
  .sc-tabs { display:flex; gap:10px; flex-wrap:wrap; margin:0 0 24px 0; justify-content:center; }
  .sc-tab { appearance:none; border:1px solid rgba(255,255,255,0.08); background:rgba(4,13,13,0.55); border-radius:12px; padding:12px 16px; display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none; text-align:left; color:inherit; transition:transform 0.2s ease, border-color 0.25s ease, background 0.25s ease; }
  .sc-tab:hover { transform:translateY(-1px); border-color:rgba(215,175,51,0.20); background:rgba(4,13,13,0.70); }
  .sc-tab.is-active { border-color:rgba(215,175,51,0.30); box-shadow:0 0 0 1px rgba(215,175,51,0.10); }
  .sc-tab:focus-visible { outline:2px solid rgba(215,175,51,0.35); outline-offset:2px; }
  .sc-tab-icon { width:20px; height:20px; display:grid; place-items:center; flex:0 0 auto; }
  .sc-tab-icon img { width:20px; height:20px; display:block; }
  .sc-tab-meta { display:flex; flex-direction:column; gap:2px; min-width:0; }
  .sc-tab-title { font-family:'Satoshi',sans-serif; font-size:12px; font-weight:700; letter-spacing:0.6px; text-transform:uppercase; color:rgba(245,240,232,0.85); line-height:1.15; }
  .sc-tab-sub { font-family:'Satoshi',sans-serif; font-size:11px; color:rgba(245,240,232,0.40); line-height:1.15; }
  .showcase-content { position:relative; }
  .content-panel { display:none; }
  .content-panel.active { display:block; animation:panelIn 0.4s ease; }
  @keyframes panelIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  /* === DEVICE SCENE === */
  .devices-scene { display:flex; align-items:flex-end; justify-content:center; gap:40px; margin-bottom:24px; width:100%; }
  .dev { display:flex; flex-direction:column; align-items:center; flex-shrink:0; }
  .dev-frame { border:2px solid rgba(255,255,255,0.08); background:#181818; box-shadow:0 20px 60px rgba(0,0,0,0.5); overflow:hidden; transition:box-shadow 0.3s ease, border-color 0.3s ease; }
  .dev:hover .dev-frame { border-color:rgba(215,175,51,0.22); box-shadow:0 24px 70px rgba(0,0,0,0.55), 0 0 0 1px rgba(215,175,51,0.10); }
  .dev-screen { overflow:hidden; }
  .dev-screen img { display:block; width:100%; height:auto; will-change:transform; }
  .dev-label { margin-top:12px; font-family:'Satoshi',sans-serif; font-size:11px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:rgba(245,240,232,0.4); text-align:center; }
  .dev-phone .dev-frame { width:140px; border-radius:20px; padding:8px 6px; position:relative; }
  .dev-phone .dev-frame::before { content:''; position:absolute; top:5px; left:50%; transform:translateX(-50%); width:28px; height:4px; background:rgba(255,255,255,0.08); border-radius:4px; z-index:2; }
  .dev-phone .dev-screen { border-radius:14px; height:280px; margin-top:4px; }
  .dev-phone .dev-screen img { animation:showcase-scroll-mobile 28s ease-in-out infinite alternate; }
  .dev-tablet .dev-frame { width:300px; border-radius:12px; padding:10px; }
  .dev-tablet .dev-screen { border-radius:6px; height:400px; }
  .dev-tablet .dev-screen img { animation:showcase-scroll-tablet 24s ease-in-out infinite alternate; }
  .dev-laptop .dev-frame { width:560px; border-radius:8px 8px 0 0; padding:6px 6px 0; border-bottom:none; position:relative; }
  .dev-laptop .dev-frame::before { content:''; position:absolute; top:3px; left:50%; transform:translateX(-50%); width:5px; height:5px; background:rgba(255,255,255,0.15); border-radius:50%; z-index:2; }
  .dev-laptop .dev-screen { border-radius:3px 3px 0 0; margin-top:2px; height:340px; }
  .dev-laptop .dev-screen img { animation:showcase-scroll-desktop 20s ease-in-out infinite alternate; }
  .dev-laptop-base { height:8px; width:60%; background:rgba(255,255,255,0.06); border-radius:0 0 6px 6px; }
  @keyframes showcase-scroll-mobile { 0% { transform:translateY(0); } 100% { transform:translateY(calc(-100% + 280px)); } }
  @keyframes showcase-scroll-tablet { 0% { transform:translateY(0); } 100% { transform:translateY(calc(-100% + 400px)); } }
  @keyframes showcase-scroll-desktop { 0% { transform:translateY(0); } 100% { transform:translateY(calc(-100% + 340px)); } }
  .project-info { padding:18px 20px; background:rgba(69,115,64,0.05); border:1px solid rgba(69,115,64,0.12); border-radius:10px; }
  .project-info .pi-title { font-family:'Clash Display',sans-serif; font-size:13px; font-weight:600; color:#457340; margin-bottom:4px; }
  .project-info .pi-text { font-size:12px; color:rgba(245,240,232,0.45); line-height:1.6; }

  /* === LIGHTBOX === */
  .sc-lightbox { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(4,13,13,0.85); backdrop-filter:blur(16px); display:none; align-items:center; justify-content:center; z-index:9999; animation:scLbIn 0.2s ease; padding:40px; }
  .sc-lightbox.is-open { display:flex; }
  .sc-lightbox img { max-width:92vw; max-height:86vh; border-radius:12px; border:1px solid rgba(251,252,251,0.12); box-shadow:0 0 80px rgba(0,0,0,0.6); }
  .sc-lightbox .sc-lb-close { position:absolute; top:20px; right:20px; width:40px; height:40px; border-radius:999px; background:rgba(251,252,251,0.06); border:1px solid rgba(251,252,251,0.10); color:#FBFCFB; display:flex; align-items:center; justify-content:center; font-size:18px; cursor:pointer; transition:all 0.2s ease; }
  .sc-lightbox .sc-lb-close:hover { background:rgba(251,252,251,0.10); transform:scale(1.05); }
  .sc-lightbox .sc-lb-caption { position:absolute; bottom:24px; left:50%; transform:translateX(-50%); font-family:'Satoshi',sans-serif; font-size:12px; color:rgba(251,252,251,0.5); letter-spacing:0.3px; }
  @keyframes scLbIn { from{opacity:0} to{opacity:1} }
  .sc-zoomable { cursor:zoom-in; transition:transform 0.2s ease; }
  .sc-zoomable:hover { transform:scale(1.015); }

  /* === REPORT IMAGES === */
  .pmc-report-area { padding:14px; border-radius:12px; overflow:hidden; border:1px solid rgba(245,240,232,0.08); background:rgba(255,255,255,0.01); width:100%; margin-top:24px; margin-bottom:16px; }
  .pmc-report-item { margin:0; position:relative; border-radius:12px; overflow:hidden; border:1px solid rgba(245,240,232,0.08); background:rgba(0,0,0,0.18); transition:border-color 0.25s ease, transform 0.2s ease; }
  .pmc-report-item:hover { border-color:rgba(215,175,51,0.22); transform:translateY(-2px); }
  .pmc-report-item.is-wide { grid-column:1/-1; width:100%; overflow:hidden; border-radius:8px; }
  .pmc-report-item img { display:block; width:100%; height:auto; background:#fff; }
  .pmc-report-cap { position:relative !important; top:auto !important; left:auto !important; bottom:auto !important; right:auto !important; transform:none !important; display:block !important; text-align:center !important; margin-top:8px !important; font-size:12px !important; font-weight:500; letter-spacing:normal; text-transform:none; color:rgba(245,240,232,0.5) !important; background:none !important; padding:0 !important; border:none; backdrop-filter:none; z-index:auto; border-radius:0; font-family:'Satoshi',sans-serif; }
  .pmc-report-cap::before { display:none; }

  /* === SERVICES / CAPTIONS === */
  .arete-services-list { list-style:none; margin:0 0 24px 0; padding:0; display:flex; flex-direction:column; gap:8px; }
  .arete-services-list li { font-family:'Satoshi',sans-serif; font-size:13.5px; color:rgba(245,240,232,0.7); line-height:1.5; padding-left:18px; position:relative; }
  .arete-services-list li::before { content:""; position:absolute; left:0; top:8px; width:6px; height:6px; border-radius:50%; background:#D7AF33; }
  .arete-img-caption { font-family:'Satoshi',sans-serif; font-size:13px; color:rgba(245,240,232,0.45); line-height:1.5; margin:12px 0 0 0; font-style:italic; padding:0 4px; word-wrap:break-word; overflow-wrap:break-word; }

  /* === INTAKE FORM === */
  #csa-intake-form { margin-left:auto !important; margin-right:auto !important; }
  .pmc-csa-card { max-width:660px; margin:0 auto !important; padding:0 20px; width:100%; display:block; box-sizing:border-box; }
  /* === ACCESSIBILITY === */
  .pmc-results-tab:focus-visible,.pmc-fcb-btn:focus-visible,.sc-lb-close:focus-visible { outline:2px solid rgba(215,175,51,0.55); outline-offset:3px; }

  /* === 768px: device scene === */
  @media (max-width:768px) {
    .devices-scene { gap:24px; }
    .dev-phone .dev-frame { width:100px; } .dev-phone .dev-screen { height:200px; }
    .dev-tablet .dev-frame { width:220px; } .dev-tablet .dev-screen { height:300px; }
    .dev-laptop .dev-frame { width:400px; } .dev-laptop .dev-screen { height:250px; }
  }

  /* === 480px: device scene stacking === */
  @media (max-width:480px) {
    .devices-scene { flex-direction:column; align-items:center; gap:32px; }
    .dev-phone .dev-frame { width:160px; } .dev-phone .dev-screen { height:280px; }
    .dev-tablet .dev-frame { width:300px; } .dev-tablet .dev-screen { height:400px; }
    .dev-laptop .dev-frame { width:340px; } .dev-laptop .dev-screen { height:210px; }
  }

  /* === 767px TABLET === */
  @media (max-width:767px) {
    .topbar-dismiss { min-width:44px !important; min-height:44px !important; display:flex !important; align-items:center !important; justify-content:center !important; z-index:9999 !important; position:relative !important; -webkit-tap-highlight-color:transparent !important; touch-action:manipulation !important; }
    .section-primary-wrapper.section-cs { padding-top:56px !important; padding-bottom:32px !important; }
    .div-embed-divider.is-cs { display:none !important; }
    .pmc-results,.pmc-fcb-wrap,.pmc-csa-card,.pmc-report-area,.pmc-results-card { max-width:100% !important; overflow-x:hidden !important; box-sizing:border-box !important; }
