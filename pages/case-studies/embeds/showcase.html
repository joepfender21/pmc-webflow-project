<div class="showcase">
  <div class="showcase-header">
    <h2>The Showcase</h2>
  </div>

  <!-- TOP TABS -->
  <div class="sc-tabs" role="tablist" aria-label="Showcase categories">
    <button class="sc-tab is-active" type="button" role="tab" aria-selected="true" data-tab="website">
      <span class="sc-tab-icon" aria-hidden="true">
        <!-- Tab icon goes here -->
      </span>
      <span class="sc-tab-meta">
        <span class="sc-tab-title">Website Build</span>
        <span class="sc-tab-sub">Custom Site Build</span>
      </span>
    </button>
  </div>

  <div class="showcase-content">

    <!-- WEBSITE BUILD -->
    <div class="content-panel active" id="panel-website" role="tabpanel">

      <!-- Overlapping device composition -->
      <div class="devices-scene">

        <!-- Phone - front left -->
        <div class="dev dev-phone">
          <div class="dev-frame">
            <div class="dev-screen">
              <img src="https://cdn.prod.website-files.com/698f6b2d83529eb0de880884/69bb1367e617234b180003bb_mybs-mobile.webp" alt="Website build - mobile view">
            </div>
          </div>
          <div class="dev-label">Mobile</div>
        </div>

        <!-- Tablet - center left -->
        <div class="dev dev-tablet">
          <div class="dev-frame">
            <div class="dev-screen">
              <img src="https://cdn.prod.website-files.com/698f6b2d83529eb0de880884/69bb1367a59ab543039ccbcf_mybs-tablet.webp" alt="Website build - tablet view">
            </div>
          </div>
          <div class="dev-label">Tablet</div>
        </div>

        <!-- Laptop - right, largest -->
        <div class="dev dev-laptop">
          <div class="dev-frame">
            <div class="dev-screen">
              <img src="https://cdn.prod.website-files.com/698f6b2d83529eb0de880884/69bb1367bfe8f1c8e5bcd3e4_mybs-desktop.webp" alt="Website build - desktop view">
            </div>
          </div>
          <div class="dev-laptop-base"></div>
          <div class="dev-label">Desktop</div>
        </div>

      </div>

      <div class="project-info">
        <div class="pi-title">Full Site Build</div>
        <div class="pi-text">Responsive from the ground up. Custom layout, scroll-driven animations, AI-generated hero video, and a booking flow built to convert walk-in culture to online appointments.</div>
      </div>
    </div>

  </div>
</div>
