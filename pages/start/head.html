<meta name="robots" content="noindex, nofollow">

<style>
  /* ========================================
     PMC START PAGE - ALL PAGE CSS
     ======================================== */

  /* --- AMBIENT SPOTLIGHT + AURORA --- */
  .section-primary-wrapper { position: relative; overflow: hidden; }
  .section-primary-wrapper::before,
  .section-primary-wrapper::after {
    content: ""; position: absolute; inset: -2px;
    pointer-events: none; z-index: 0; opacity: 0.0;
    transition: opacity 500ms ease;
  }
  .section-primary-wrapper::before {
    opacity: 0.55;
    background: radial-gradient(420px circle at var(--pmc-x, 50%) var(--pmc-y, 35%),
      rgba(215,175,51,0.10), rgba(69,115,64,0.07) 35%, rgba(0,0,0,0) 70%);
    filter: blur(0px); mix-blend-mode: screen;
  }
  .section-primary-wrapper::after {
    opacity: 0.65;
    background:
      radial-gradient(700px circle at 20% calc(10% + var(--pmc-s, 0px)),
        rgba(69,115,64,0.10), rgba(0,0,0,0) 60%),
      radial-gradient(760px circle at 85% calc(30% + var(--pmc-s, 0px)),
        rgba(215,175,51,0.08), rgba(0,0,0,0) 65%);
    filter: blur(10px); mix-blend-mode: screen;
  }
  .section-primary-wrapper > * { position: relative; z-index: 1; }

  /* --- LOGO HALO --- */
  .start-logo-stage {
    position: relative; border-radius: 999px;
    transition: transform 400ms cubic-bezier(0.22,1,0.36,1);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 0 40px 10px rgba(69,115,64,0.07), 0 0 70px 22px rgba(215,175,51,0.04);
  }
  .start-logo-stage::after {
    content: ""; position: absolute; inset: -10px; border-radius: inherit;
    background: conic-gradient(from 180deg, rgba(69,115,64,0.0), rgba(69,115,64,0.20), rgba(215,175,51,0.18), rgba(69,115,64,0.0));
    filter: blur(10px); opacity: 0.55;
    animation: pmc-orbit 10s linear infinite; pointer-events: none;
  }
  .start-logo-stage:hover {
    transform: translateY(-1px) scale(1.01);
    box-shadow: 0 0 0 1px rgba(215,175,51,0.18), 0 0 55px 14px rgba(69,115,64,0.10), 0 0 95px 28px rgba(215,175,51,0.06);
  }
  @keyframes pmc-orbit { to { transform: rotate(360deg); } }

  /* --- DIVIDER SHIMMER --- */
  .div-embed-divider { position: relative; overflow: hidden; opacity: 0.72; }
  .section-primary-wrapper:hover .div-embed-divider { opacity: 0.85; width: 48px; }
  .div-embed-divider::after {
    content: ""; position: absolute; top: -50%; left: -35%; width: 35%; height: 200%;
    background: linear-gradient(90deg, rgba(215,175,51,0) 0%, rgba(215,175,51,0.55) 50%, rgba(215,175,51,0) 100%);
    transform: skewX(-18deg) translateX(-120%); filter: blur(0.2px); opacity: 0; pointer-events: none;
  }
  .section-primary-wrapper:hover .div-embed-divider::after {
    opacity: 1; animation: pmc-divider-shimmer 1.15s cubic-bezier(0.22,1,0.36,1) infinite;
  }
  @keyframes pmc-divider-shimmer {
    0%   { transform: skewX(-18deg) translateX(-120%); }
    100% { transform: skewX(-18deg) translateX(420%); }
  }

  /* --- FORM CARD CONTAINER + SHIMMER --- */
  .pmc-start {
    position: relative; overflow: hidden;
    max-width: 580px; margin-left: auto; margin-right: auto; margin-top: 80px;
  }
  .pmc-start::after {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: rgba(215,175,51,0.18); pointer-events: none; z-index: 2;
  }
  .pmc-start::before {
    content: ""; position: absolute; top: 0; left: -40%; width: 180%; height: 2px;
    background: linear-gradient(90deg, rgba(215,175,51,0) 0%, rgba(215,175,51,0.20) 30%, rgba(215,175,51,0.95) 50%, rgba(215,175,51,0.20) 70%, rgba(215,175,51,0) 100%);
    opacity: 0; transform: translateX(-35%); filter: drop-shadow(0 0 10px rgba(215,175,51,0.22));
    pointer-events: none; z-index: 3;
  }
  .pmc-start.pmc-shimmer-active::before {
    opacity: 0.95; animation: pmc-top-shimmer 2.6s linear infinite, pmc-top-glow 4.5s ease-in-out infinite;
  }
  @keyframes pmc-top-shimmer { 0% { transform: translateX(-35%); } 100% { transform: translateX(35%); } }
  @keyframes pmc-top-glow {
    0%,100% { filter: drop-shadow(0 0 8px rgba(215,175,51,0.18)); opacity: 0.70; }
    50%      { filter: drop-shadow(0 0 14px rgba(215,175,51,0.30)); opacity: 0.98; }
  }

  @media (max-width: 767px) {
    .pmc-start { margin-top: 48px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .start-logo-stage::after { animation: none !important; }
    .section-primary-wrapper::before, .section-primary-wrapper::after { transition: none !important; }
    .div-embed-divider::after { animation: none !important; opacity: 0 !important; }
    .pmc-start::before { animation: none !important; opacity: 0 !important; }
  }
</style>
