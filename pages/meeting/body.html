<script>
(function(){
  if(window.__pmc_meeting_page)return;
  window.__pmc_meeting_page=true;
  try{if(window.Webflow&&Webflow.env&&Webflow.env('design'))return;}catch(e){}

  (function(){
    var s=document.querySelector('.section-primary-wrapper');
    if(!s)return;
    var rect=null,rafM=null,rafS=null;
    function upRect(){rect=s.getBoundingClientRect();}
    upRect();
    window.addEventListener('resize',upRect,{passive:true});
    window.addEventListener('mousemove',function(e){
      if(rafM)return;
      rafM=requestAnimationFrame(function(){
        if(rect){
          s.style.setProperty('--pmc-x',(((e.clientX-rect.left)/rect.width)*100).toFixed(1)+'%');
          s.style.setProperty('--pmc-y',(((e.clientY-rect.top)/rect.height)*100).toFixed(1)+'%');
        }
        rafM=null;
      });
    },{passive:true});
    function onScroll(){
      if(rafS)return;
      rafS=requestAnimationFrame(function(){
        upRect();
        if(rect){
          var p=Math.min(1,Math.max(0,1-(rect.top/(window.innerHeight||800))));
          s.style.setProperty('--pmc-s',Math.round(p*70)+'px');
        }
        rafS=null;
      });
    }
    window.addEventListener('scroll',onScroll,{passive:true});
    onScroll();
  })();

  (function(){
    var c=document.querySelector('.pmc-scheduler-card');
    if(!c)return;
    if('IntersectionObserver' in window){
      var obs=new IntersectionObserver(function(entries){
        entries.forEach(function(en){
          en.isIntersecting?c.classList.add('pmc-shimmer-active'):c.classList.remove('pmc-shimmer-active');
        });
      },{threshold:0.15});
      obs.observe(c);
      window.__pmc_meeting_obs=obs;
    }else{
      c.classList.add('pmc-shimmer-active');
    }
  })();
})();
</script>
